<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản | QUAN AO Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 md:p-12 my-8">
        <div class="text-center mb-8">
            <a th:href="@{/home}" class="text-3xl font-black tracking-tighter uppercase italic inline-block mb-2">
                QUAN AO<span class="text-blue-600">.</span>
            </a>
            <h2 class="text-xl font-semibold text-gray-700">Tạo tài khoản mới</h2>
        </div>
        <div th:if="${errorMessage}" 
            class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-lg shadow-sm">
            <div class="flex items-center">
                <span class="text-red-500 mr-2">⚠️</span>
                <p class="text-sm text-red-700 font-medium" th:text="${errorMessage}"></p>
            </div>
        </div>

        <form th:action="@{/auth/register}" th:object="${user}" method="post" id="registerForm" class="space-y-4">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">Username</label>
                    <input type="text" th:field="*{username}" required placeholder="user123"
                           class="w-full px-4 py-2 rounded-lg bg-gray-50 border border-gray-200 focus:border-black outline-none text-sm transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">Họ và Tên</label>
                    <input type="text" th:field="*{fullName}" required placeholder="Nguyễn Văn A"
                           class="w-full px-4 py-2 rounded-lg bg-gray-50 border border-gray-200 focus:border-black outline-none text-sm transition-all">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">Email</label>
                <input type="email" th:field="*{email}" required placeholder="example@gmail.com"
                       class="w-full px-4 py-2 rounded-lg bg-gray-50 border border-gray-200 focus:border-black outline-none text-sm transition-all">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">Số điện thoại</label>
                    <input type="text" th:field="*{phone}" required placeholder="0987654321"
                           class="w-full px-4 py-2 rounded-lg bg-gray-50 border border-gray-200 focus:border-black outline-none text-sm transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">Địa chỉ</label>
                    <input type="text" th:field="*{address}" required placeholder="Hà Nội"
                           class="w-full px-4 py-2 rounded-lg bg-gray-50 border border-gray-200 focus:border-black outline-none text-sm transition-all">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">Mật khẩu</label>
                <input type="password" th:field="*{password}" id="password" required placeholder="••••••••"
                       class="w-full px-4 py-2 rounded-lg bg-gray-50 border border-gray-200 focus:border-black outline-none text-sm transition-all">
                <p id="msg-pwd" class="text-[9px] mt-1 font-bold"></p>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">Xác nhận lại</label>
                <input type="password" id="confirm_password" required placeholder="••••••••"
                       class="w-full px-4 py-2 rounded-lg bg-gray-50 border border-gray-200 focus:border-black outline-none text-sm transition-all">
                <p id="msg-confirm" class="text-[9px] mt-1 font-bold"></p>
            </div>

            <button type="submit" id="submitBtn" disabled
                    class="w-full bg-black text-white font-bold py-4 rounded-lg hover:bg-gray-800 transform active:scale-[0.98] transition-all shadow-lg mt-2 opacity-50 cursor-not-allowed">
                ĐĂNG KÝ NGAY
            </button>
        </form>

        <p class="text-center mt-8 text-sm text-gray-500">
            Đã có tài khoản? <a th:href="@{/auth/login}" class="font-bold text-black hover:underline">Đăng nhập</a>
        </p>
    </div>

    <script>
        const password = document.getElementById('password');
        const confirm_password = document.getElementById('confirm_password');
        const msgPwd = document.getElementById('msg-pwd');
        const msgConfirm = document.getElementById('msg-confirm');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('registerForm');

        function validate() {
            const p = password.value;
            const c = confirm_password.value;
            
            // Check độ dài
            const isLenValid = p.length >= 8;
            if (p.length > 0) {
                msgPwd.innerText = isLenValid ? "✓ Hợp lệ" : "✕ Tối thiểu 8 ký tự";
                msgPwd.style.color = isLenValid ? "#10b981" : "#ef4444";
            }

            // Check khớp
            const isMatch = (p === c && c !== "");
            if (c.length > 0) {
                msgConfirm.innerText = isMatch ? "✓ Khớp" : "✕ Không khớp";
                msgConfirm.style.color = isMatch ? "#10b981" : "#ef4444";
            }

            // Check tất cả các trường đã điền chưa
            const allFilled = Array.from(form.querySelectorAll('input[required]'))
                                   .every(input => input.value.trim() !== "");

            // Bật nút
            if (isLenValid && isMatch && allFilled) {
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1";
                submitBtn.classList.remove('cursor-not-allowed');
            } else {
                submitBtn.disabled = true;
                submitBtn.style.opacity = "0.5";
                submitBtn.classList.add('cursor-not-allowed');
            }
        }

        form.addEventListener('input', validate);
    </script>
</body>
</html>
