<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white rounded-2xl shadow-lg flex w-[800px] min-h-[500px] overflow-hidden">

        <!-- LEFT (GIỐNG LOGIN) -->
        <div class="w-1/2 bg-gradient-to-b from-blue-400 to-blue-200 flex items-center justify-center">
            <div class="text-center">
                <img th:src="@{/img/image.png}" class="w-60 mx-auto">
                <h2 class="text-2xl font-bold text-yellow-400 mt-4">THOI TRAN GIA DINH</h2>
            </div>
        </div>
        <!-- RIGHT -->
        <div class="w-1/2 p-8 flex flex-col justify-center overflow-y-auto">

            <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>
            <div th:if="${error}" class="text-red-500 text-sm text-center mb-3">
                <p th:text="${error}"></p>
            </div>
            <form th:action="@{/auth/register}" method="post" onsubmit="return validateForm()">

                <!-- USERNAME -->
                <div class="mb-4 relative">
                    <i class="fa fa-user absolute left-3 top-3 text-gray-400"></i>
                    <input id="username" name="username" placeholder="Username"
                        class="w-full pl-10 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400"
                        th:value="${username}">
                    <p id="userError" class="text-red-500 text-sm hidden"></p>
                </div>

                <!-- EMAIL -->
                <div class="mb-4 relative">
                    <i class="fa fa-envelope absolute left-3 top-3 text-gray-400"></i>
                    <input id="email" name="email" placeholder="Email"
                        class="w-full pl-10 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400"
                        th:value="${email}">
                    <p id="emailError" class="text-red-500 text-sm hidden"></p>
                </div>

                <!-- PASSWORD -->
                <div class="mb-4 relative">
                    <i class="fa fa-lock absolute left-3 top-3 text-gray-400"></i>
                    <input id="password" type="password" name="password" placeholder="Password"
                        class="w-full pl-10 pr-10 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400"
                        th:value="${password}">

                    <i class="fa fa-eye absolute right-3 top-3 cursor-pointer text-gray-500"
                        onclick="togglePassword('password')"></i>

                    <p id="passError" class="text-red-500 text-sm hidden"></p>
                </div>

                <!-- CONFIRM -->
                <div class="mb-2 relative">
                    <i class="fa fa-lock absolute left-3 top-3 text-gray-400"></i>
                    <input id="confirmPassword" type="password" placeholder="Confirm Password"
                        class="w-full pl-10 pr-10 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400">

                    <i class="fa fa-eye absolute right-3 top-3 cursor-pointer text-gray-500"
                        onclick="togglePassword('confirmPassword')"></i>

                    <p id="confirmError" class="text-red-500 text-sm hidden"></p>
                </div>

                <button class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 mt-4">
                    REGISTER
                </button>

            </form>

            <p class="text-center text-sm mt-4">
                Already have an account?
                <a th:href="@{/auth/login}" class="text-blue-500">Login</a>
            </p>

        </div>
    </div>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
        }

        function validateForm() {
            let valid = true;

            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirmPassword").value;

            const userError = document.getElementById("userError");
            const emailError = document.getElementById("emailError");
            const passError = document.getElementById("passError");
            const confirmError = document.getElementById("confirmError");

            [userError, emailError, passError, confirmError].forEach(e => e.classList.add("hidden"));

            if (!username) {
                userError.innerText = "Không được để trống username";
                userError.classList.remove("hidden");
                valid = false;
            }

            if (!email || !email.includes("@")) {
                emailError.innerText = "Email không hợp lệ";
                emailError.classList.remove("hidden");
                valid = false;
            }

            if (password.length < 6) {
                passError.innerText = "Mật khẩu >= 6 ký tự";
                passError.classList.remove("hidden");
                valid = false;
            }

            if (password !== confirm) {
                confirmError.innerText = "Mật khẩu không khớp";
                confirmError.classList.remove("hidden");
                valid = false;
            }

            return valid;
        }
    </script>

</body>

</html>
