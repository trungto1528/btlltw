<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản | QUAN AO Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 md:p-12 my-8">
        <div class="text-center mb-8">
            <a th:href="@{/home}" class="text-3xl font-black tracking-tighter uppercase italic inline-block mb-2">
                QUAN AO<span class="text-blue-600">.</span>
            </a>
            <h2 class="text-xl font-semibold text-gray-700">Tạo tài khoản mới</h2>
            <p class="text-sm text-gray-400 mt-2">Trở thành thành viên để nhận ưu đãi đặc biệt</p>
        </div>

        <form th:action="@{/auth/register}" method="post" class="space-y-5">
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Tên người dùng</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 text-sm">@</span>
                    <input type="text" name="username" required
                           placeholder="username123"
                           class="w-full pl-8 pr-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-black focus:bg-white focus:ring-0 transition-all outline-none text-sm">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Địa chỉ Email</label>
                <input type="email" name="email" required
                       placeholder="example@gmail.com"
                       class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-black focus:bg-white focus:ring-0 transition-all outline-none text-sm">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Mật khẩu</label>
                <input type="password" name="password" required
                       placeholder="Tối thiểu 8 ký tự"
                       class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-black focus:bg-white focus:ring-0 transition-all outline-none text-sm">
            </div>

            <div class="flex items-start gap-3 mt-2">
                <input type="checkbox" required class="mt-1 rounded border-gray-300 text-black focus:ring-black">
                <p class="text-[11px] text-gray-500 leading-tight">
                    Tôi đồng ý với <a href="#" class="underline text-black">Điều khoản dịch vụ</a> và <a href="#" class="underline text-black">Chính sách bảo mật</a> của QUAN AO.
                </p>
            </div>

            <button type="submit" 
                    class="w-full bg-black text-white font-bold py-4 rounded-lg hover:bg-gray-800 transform active:scale-[0.98] transition-all shadow-lg mt-4">
                TẠO TÀI KHOẢN
            </button>
        </form>

        <p class="text-center mt-10 text-sm text-gray-500">
            Bạn đã có tài khoản rồi? 
            <a th:href="@{/auth/login}" class="font-bold text-black hover:underline decoration-blue-600 decoration-2">Đăng nhập</a>
        </p>
    </div>

</body>
</html>
