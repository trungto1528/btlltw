<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng | QUAN AO Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-white">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="max-w-7xl mx-auto px-4 py-16">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter mb-12">Giỏ hàng của bạn</h1>

        <div th:if="${#lists.isEmpty(cartItems)}" class="py-20 text-center border-t border-gray-100">
            <p class="text-gray-400 uppercase tracking-widest text-xs mb-8">Giỏ hàng đang trống</p>
            <a th:href="@{/products}" class="bg-black text-white px-8 py-4 font-bold text-xs tracking-widest">TIẾP TỤC MUA SẮM</a>
        </div>

        <div th:unless="${#lists.isEmpty(cartItems)}" class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            
            <div class="lg:col-span-8">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-gray-100 text-[10px] uppercase tracking-[0.2em] text-gray-400">
                            <th class="pb-4 font-bold">Sản phẩm</th>
                            <th class="pb-4 font-bold text-center">Số lượng</th>
                            <th class="pb-4 font-bold text-right">Tổng cộng</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <tr th:each="item : ${cartItems}" class="group">
                            <td class="py-8">
                                <div class="flex gap-6">
                                    <img th:src="${item.variant.product.imageUrl}" class="w-24 aspect-[3/4] object-cover bg-gray-50">
                                    <div class="flex flex-col justify-center">
                                        <h3 class="font-black uppercase italic tracking-tighter text-lg mb-1" th:text="${item.variant.product.productName}"></h3>
                                        <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-2">
                                            Màu: <span class="text-black" th:text="${item.variant.color}"></span> / 
                                            Size: <span class="text-black" th:text="${item.variant.size}"></span>
                                        </p>
                                        <p class="text-sm font-light text-gray-500" th:text="${#numbers.formatDecimal(item.variant.product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></p>
                                        <form th:action="@{/cart/remove}" method="post" class="mt-4">
                                            <input type="hidden" name="itemId" th:value="${item.id}">
                                            <button type="submit" class="text-[10px] font-bold uppercase tracking-widest text-red-500 hover:underline">Xóa</button>
                                        </form>
                                    </div>
                                </div>
                            </td>
                            <td class="py-8 text-center">
                                <span class="font-bold" th:text="${item.quantity}"></span>
                            </td>
                            <td class="py-8 text-right font-light text-lg">
                                <span th:text="${#numbers.formatDecimal(item.variant.product.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="lg:col-span-4">
                <div class="bg-gray-50 p-8 sticky top-24">
                    <h2 class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-8 border-b border-gray-200 pb-4">Tóm tắt đơn hàng</h2>
                    
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">Tạm tính</span>
                            <span class="font-medium" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">Phí vận chuyển</span>
                            <span class="font-medium text-green-600 italic uppercase text-[10px] font-bold">Miễn phí</span>
                        </div>
                    </div>

                    <div class="border-t border-gray-200 pt-6 mb-12">
                        <div class="flex justify-between items-end">
                            <span class="text-[10px] font-bold uppercase tracking-widest">Tổng cộng</span>
                            <span class="text-3xl font-black italic tracking-tighter" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                        </div>
                    </div>

                    <a th:href="@{/checkout}" class="block w-full bg-black text-white text-center font-bold py-5 tracking-widest hover:bg-gray-800 transition-all active:scale-[0.98]">
                        TIẾN HÀNH THANH TOÁN
                    </a>
                    
                    <p class="text-[10px] text-gray-400 mt-6 text-center italic">
                        * Đơn hàng sẽ được xử lý trong vòng 24h.
                    </p>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
