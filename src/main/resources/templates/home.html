<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>QUAN AO Store | Thời trang cao cấp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-white text-gray-900">

    <div th:replace="~{fragments/header :: header}"></div>

    <section class="relative h-[80vh] flex items-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2000" 
                 class="w-full h-full object-cover object-top brightness-75" alt="Hero Banner">
        </div>
        <div class="relative z-10 max-w-7xl mx-auto px-4 w-full text-white">
            <p class="uppercase tracking-[0.3em] font-bold mb-4 text-sm">New Collection 2026</p>
            <h1 class="text-6xl md:text-8xl font-black mb-8 leading-tight uppercase italic">Minimalist<br>Lifestyle.</h1>
            <a th:href="@{/products}" 
               class="inline-block bg-white text-black px-10 py-4 font-bold rounded-full hover:bg-blue-600 hover:text-white transition-all transform hover:scale-105 shadow-2xl">
               SHOP NOW →
            </a>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 py-20">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="relative h-[400px] group overflow-hidden rounded-2xl cursor-pointer">
                <img src="https://images.unsplash.com/photo-1488161628813-04466f872be2?q=80&w=600" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                <div class="absolute inset-0 bg-black/20 group-hover:bg-black/40 transition flex items-center justify-center">
                    <h3 class="text-white text-3xl font-black italic uppercase tracking-tighter">Nam</h3>
                </div>
            </div>
            <div class="relative h-[400px] group overflow-hidden rounded-2xl cursor-pointer">
                <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=600" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                <div class="absolute inset-0 bg-black/20 group-hover:bg-black/40 transition flex items-center justify-center">
                    <h3 class="text-white text-3xl font-black italic uppercase tracking-tighter">Nữ</h3>
                </div>
            </div>
            <div class="relative h-[400px] group overflow-hidden rounded-2xl cursor-pointer">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=600" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                <div class="absolute inset-0 bg-black/20 group-hover:bg-black/40 transition flex items-center justify-center">
                    <h3 class="text-white text-3xl font-black italic uppercase tracking-tighter">Phụ kiện</h3>
                </div>
            </div>
        </div>
    </section>

    <section class="bg-gray-50 py-20">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-4xl font-black tracking-tight uppercase italic">Best Sellers</h2>
                    <p class="text-gray-500">Những món đồ được yêu thích nhất tuần này.</p>
                </div>
                <a th:href="@{/products}" class="text-sm font-bold border-b-2 border-black pb-1 hover:text-blue-600 hover:border-blue-600 transition">XEM TẤT CẢ</a>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div th:each="product : ${featuredProducts}" class="group">
                    <div class="relative aspect-[3/4] mb-4 overflow-hidden rounded-xl shadow-sm bg-white">
                        <img th:src="${product.imageUrl}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                    </div>
                    <h4 th:text="${product.productName}" class="font-bold text-sm truncate"></h4>
                    <p th:text="${#numbers.formatInteger(product.price, 3, 'POINT') + ' đ'}" class="text-blue-600 font-bold mt-1"></p>
                </div>
            </div>
        </div>
    </section>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
