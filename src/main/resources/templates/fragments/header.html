<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    </head>
<body>
    <header th:fragment="header" class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center gap-8">
            <div class="flex-shrink-0">
                <a th:href="@{/home}" class="text-2xl font-black tracking-tighter uppercase italic">QUAN AO<span class="text-blue-600">.</span></a>
            </div>

            <div class="flex-1 max-w-xl hidden md:block">
                <form th:action="@{/products/search}" method="get" class="relative group">
                    <input type="text" name="keyword" th:value="${keyword != null ? keyword : ''}"
                           placeholder="Bạn đang tìm gì hôm nay?" 
                           class="w-full bg-gray-100 border-transparent focus:border-black focus:bg-white focus:ring-0 text-sm px-11 py-3 rounded-full transition-all">
                    <button type="submit" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-hover:text-black transition">🔍</button>
                </form>
            </div>

            <div class="flex items-center gap-6">
                <div sec:authorize="isAnonymous()">
                    <a th:href="@{/auth/login}" class="text-sm font-medium hover:text-blue-600 transition">Đăng nhập</a>
                </div>
                <div sec:authorize="isAuthenticated()" class="flex items-center gap-3">
                    <span class="text-sm font-bold" sec:authentication="name"></span>
                    <form th:action="@{/logout}" method="post" class="inline">
                        <button type="submit" class="text-xs text-red-500 underline">Đăng xuất</button>
                    </form>
                </div>
                <a th:href="@{/cart/view}" class="relative p-2 hover:bg-gray-100 rounded-full transition">🛒</a>
            </div>
        </div>
        
        <nav class="border-t border-gray-50 bg-white">
            <div class="max-w-7xl mx-auto px-4 flex gap-8 py-3 text-xs font-bold uppercase tracking-wider overflow-x-auto">
                <a th:href="@{/home}" class="hover:text-blue-600 whitespace-nowrap">Trang Chủ</a>
                <a href="#" class="hover:text-blue-600 whitespace-nowrap">Quần Áo</a>
                <a href="#" class="hover:text-blue-600 whitespace-nowrap">Giày Dép</a>
                <a href="#" class="hover:text-blue-600 whitespace-nowrap">Liên Hệ</a>
            </div>
        </nav>
    </header>
</body>
</html>
